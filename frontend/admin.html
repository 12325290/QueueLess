<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | QueueLess</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="glass-header">
        <div class="container nav-bar">
            <div class="logo">Queue<span>Less</span> <small style="color:var(--text-secondary);font-size:12px;">Admin</small></div>
            <nav>
                <a href="index.html" class="btn-outline">User View</a>
            </nav>
        </div>
    </header>

    <main class="container admin-view">
        <div class="admin-header">
            <h2>Queue Management</h2>
        </div>

        <div class="flex-container">
            <!-- Sidebar: Categories & Services -->
            <aside class="admin-sidebar" id="adminSidebar">
                <!-- Populated by JS -->
                Loading services...
            </aside>

            <!-- Main Panel: Queue Viewer -->
            <section class="admin-content" id="adminContent">
                <div class="queue-header">
                    <div>
                        <h3 id="manageTitle">Select a service to manage</h3>
                        <p style="color:var(--text-secondary);" id="manageLoc"></p>
                    </div>
                    <div style="text-align: right;">
                        <span style="font-size:0.9rem; color:var(--text-secondary);">Currently Serving</span><br>
                        <strong style="font-size:2rem; color:var(--accent-color);" id="manageCurrentToken">--</strong>
                    </div>
                </div>

                <div style="margin-bottom: 2rem;">
                    <button class="btn-primary" id="nextBtn" onclick="callNext()" disabled>Call Next Person</button>
                </div>

                <h3>Waiting List</h3>
                <div class="table-container" style="margin-top: 1rem; overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Token</th>
                                <th>Name</th>
                                <th>Phone</th>
                            </tr>
                        </thead>
                        <tbody id="queueTableBody">
                            <tr>
                                <td colspan="4" style="text-align:center;">Select a service first</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script src="admin.js"></script>
</body>
</html>
