<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | QueueLess</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="glass-header">
        <div class="container nav-bar">
            <div class="logo">Queue<span>Less</span> <small class="admin-badge">Admin</small></div>
            <nav>
                <a href="index.html" class="btn-outline"><i class="fas fa-external-link-alt"></i> User View</a>
            </nav>
        </div>
    </header>

    <main class="container admin-view">
        <div class="admin-header">
            <h2><i class="fas fa-user-shield"></i> Queue Management</h2>
        </div>

        <div class="flex-container">
            <!-- Sidebar: Categories & Services -->
            <aside class="admin-sidebar">
                <div class="sidebar-header">
                    <i class="fas fa-list"></i> Select Service
                </div>
                <div id="adminSidebar">
                    <div class="spinner-small"></div>
                </div>
            </aside>

            <!-- Main Panel: Queue Viewer -->
            <section class="admin-content" id="adminContent">
                <div class="queue-status-card">
                    <div class="queue-info">
                        <h3 id="manageTitle">Select a service to manage</h3>
                        <p id="manageLoc"></p>
                    </div>
                    <div class="serving-display">
                        <span>Currently Serving</span>
                        <strong id="manageCurrentToken">--</strong>
                    </div>
                </div>

                <div class="admin-actions">
                    <button class="btn-primary btn-large" id="nextBtn" onclick="callNext()" disabled>
                        <i class="fas fa-volume-up"></i> Call Next Person
                    </button>
                </div>

                <div class="waiting-list-section">
                    <div class="section-header">
                        <h3><i class="fas fa-users"></i> Waiting List</h3>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Token</th>
                                    <th>Name</th>
                                    <th>Phone</th>
                                </tr>
                            </thead>
                            <tbody id="queueTableBody">
                                <tr>
                                    <td colspan="4" class="empty-state">Select a service from the sidebar to view its queue</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="admin.js"></script>
</body>
</html>
